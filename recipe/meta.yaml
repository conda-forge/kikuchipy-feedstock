{% set name = "kikuchipy" %}
{% set version = "0.11.4" %}
{% set python_min = "3.10" %}

package:
  name: {{ name }}-meta
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 410b59b7a5c17ef0806600c6f0653f8127b0c121201b5cf2f53bf6b6ec72569c

build:
  number: 0
  noarch: python

requirements:
  host:
    - python {{ python_min }}

outputs:
  - name: {{ name }}-base
    build:
      noarch: python
      script: {{ PYTHON }} -m pip install . --no-deps -vv
    requirements:
      host:
        - python {{ python_min }}
        - hatchling
        - pip
      run:
        - python >={{ python_min }}
        - dask-core >=2021.8.1
        - diffpy.structure >=3
        - diffsims >=0.5.2
        - hyperspy-base >=2.2
        - h5py >=2.10
        - imageio
        - matplotlib-base >=3.5
        - numpy >=1.23.0
        - numba >=0.57
        - orix-base >=0.12.1
        - pooch >=1.3.0
        - pyyaml
        - rosettasciio-base >=0.3.0
        # TODO: Remove once not needed (try to comment and see if the build passes)
        - ruamel.yaml.clib >=0.2.15
        - scikit-image >=0.16.2
        - scikit-learn
        - scipy >=1.7
        - tqdm >=0.5.2
    test:
      # Test suite is run in package with all optional requirements
      requires:
        - python {{ python_min }}
        - pip
      source_files:
        - tests
        - conftest.py
      commands:
        - pip check

  - name: {{ name }}
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - {{ pin_subpackage('kikuchipy-base', exact=True) }}
        - python >={{ python_min }}
        - nlopt
        - pyebsdindex-base >=0.2,!=0.3.0,!=0.3.1
        - pyvista
    test:
      requires:
        - python {{ python_min }}
        - pip
        - pytest
        - pytest-xdist
        - pytest-rerunfailures
      source_files:
        - tests
        - conftest.py
      imports:
        - kikuchipy
        - kikuchipy.data
        - kikuchipy.detectors
        - kikuchipy.draw
        - kikuchipy.filters
        - kikuchipy.imaging
        - kikuchipy.indexing
        - kikuchipy.io
        - kikuchipy.pattern
        - kikuchipy.signals
        - kikuchipy.simulations
      commands:
        - pip check
        # TODO: Remove skipping of failing PyVista tests once is part of a release
        # https://github.com/pyxem/kikuchipy/pull/753
        - pytest tests -vvv -n 2 --reruns 2 -k "not test_plot_spherical and not test_spherical_pyvista and not test_dataset_availability"

about:
  home: https://kikuchipy.org
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: |
    Processing, simulating, and indexing of electron backscatter diffraction (EBSD)
    patterns
  description: |
    kikuchipy is a library for processing, simulating, and indexing of electron
    backscatter diffraction (EBSD) patterns in Python, built on the tools for
    multi-dimensional data analysis provided by the HyperSpy library.
  doc_url: https://kikuchipy.org
  dev_url: https://github.com/pyxem/kikuchipy

extra:
  recipe-maintainers:
    - hakonanes
